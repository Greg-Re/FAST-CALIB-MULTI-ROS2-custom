fast_calib:
  ros__parameters:    

    # Basler aca 1920-155uc
    fx: 1061.8347
    fy: 1060.88239
    cx: 962.77931
    cy: 602.90198

    k1: -0.139275
    k2: 0.064437
    p1: -0.000810
    p2: 0.001691
    
    # Calibration target parameters
    marker_size: 0.1 # ArUco marker size 
    delta_width_qr_center: 0.23 # Half the distance between the centers of two markers in the horizontal direction  
    delta_height_qr_center: 0.17 # Half the distance between the centers of two markers in the vertical direction 
    delta_width_circles: 0.18 # Distance between the centers of two circles in the horizontal direction 
    delta_height_circles: 0.22 # Distance between the centers of two circles in the vertical direction 
    circle_radius: 0.06 # Radius of the circle 
    
    # Distance filter
    x_min: 0.5
    x_max: 2.0
    y_min: -0.5
    y_max: 0.5
    z_min: -0.5
    z_max: 0.5
    

    # Input
    # NOTE: paths are relative to the directory where `ros2 launch` is invoked.
    #       Run launch commands from the package root (FAST-CALIB-MULTI-ROS2/).
    lidar_topic: "/rslidar_points" # /ouster/points /livox/lidar
    camera_topic: "/my_camera/pylon_ros2_camera_node/image_raw"
    bag_path: "/calibration-repo/data/multi_calib/half_right"

    # Output
    output_path: "/calibration-repo/src/FAST-CALIB-MULTI-ROS2/output"

    # Lidar rotation
    rotate_lidar: 180.0

# Multi-scene calibration parameters
multi_fast_calib:
  ros__parameters:
    output_path: "/calibration-repo/src/FAST-CALIB-MULTI-ROS2-custom/output"
    min_scenes: 3  # Minimum number of scenes for multi-scene calibration (>=3)
