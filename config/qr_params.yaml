fast_calib:
  ros__parameters:    

    # Basler aca 1920-155uc
    fx: 1061.8347
    fy: 1060.88239
    cx: 962.77931
    cy: 602.90198

    k1: -0.139275
    k2: 0.064437
    p1: -0.000810
    p2: 0.001691
    
    # Calibration target parameters
    marker_size: 0.1 # ArUco marker size 
    delta_width_qr_center: 0.23 # Half the distance between the centers of two markers in the horizontal direction  
    delta_height_qr_center: 0.17 # Half the distance between the centers of two markers in the vertical direction 
    delta_width_circles: 0.18 # Distance between the centers of two circles in the horizontal direction 
    delta_height_circles: 0.22 # Distance between the centers of two circles in the vertical direction 
    circle_radius: 0.06 # Radius of the circle 
    
    # Distance filter
    x_min: 0.5
    x_max: 2.0
    y_min: -0.5
    y_max: 0.5
    z_min: -0.5
    z_max: 0.5
    

    # Input
    # NOTE: paths are relative to the directory where `ros2 launch` is invoked.
    #       Run launch commands from the package root (FAST-CALIB-MULTI-ROS2/).
    lidar_topic: "/rslidar_points"
    camera_topic: "/my_camera/pylon_ros2_camera_node/image_raw"

    # Image transport for the camera subscription:
    #   "compressed" -> subscribe to <camera_topic>/compressed (JPEG over the wire,
    #                   decoded locally). Use this over a network link to avoid
    #                   flooding it with the raw stream.
    #   "raw"        -> subscribe to <camera_topic> directly (uncompressed).
    #                   Use this locally, or when image quality matters more than
    #                   bandwidth (e.g. Bayer images, where JPEG compression of the
    #                   mosaic degrades detection accuracy).
    # camera_topic above stays the BASE topic in both cases; do not append
    # "/compressed" yourself.
    camera_transport: "compressed"

    # Output
    output_path: "/fast-calib-workspace/output"

    # Lidar rotation
    rotate_lidar: 0.0

    # Live calibration parameters (used by live_fast_calib node only)
    target_scenes: 5           # number of diverse scenes to collect before joint calibration
    min_translation_diff: 0.05 # minimum board translation change (m) to accept a new scene
    min_rotation_diff: 5.0     # minimum board rotation change (deg) to accept a new scene

    # Stability gate: a scene is only captured once the board has held still for
    # `still_frames` consecutive frames. This prevents capturing while the board
    # moves, which otherwise makes the camera and the rolling LiDAR sweep disagree
    # about its pose (the main source of inaccurate live calibration).
    require_still: true
    still_translation_thresh: 0.006 # max board translation change (m) between frames to count as "still"
    still_rotation_thresh: 0.6      # max board rotation change (deg) between frames to count as "still"
    still_frames: 3                 # number of consecutive still frames required before capture

    # Verbose per-frame diagnostics (marker/circle/cluster counts, skipped-frame
    # warnings, debug PLY snapshots). When false, the node only logs on startup
    # and when a scene is captured / calibration completes.
    debug: false

# Multi-scene calibration parameters
multi_fast_calib:
  ros__parameters:
    output_path: "/fast-calib-workspace/output"
    min_scenes: 3  # Minimum number of scenes for multi-scene calibration 
