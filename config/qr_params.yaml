    # Calibration target parameters
    marker_size: 0.1 # ArUco marker size 4.7cm
    delta_width_qr_center: 0.340 # Half the distance between the centers of two markers in the horizontal direction 
    delta_height_qr_center: 0.217 # Half the distance between the centers of two markers in the vertical direction (13.5cm / 2)
    delta_width_circles: 0.15 # Distance between the centers of two circles in the horizontal direction (17.6cm)
    delta_height_circles: 0.126 # Distance between the centers of two circles in the vertical direction (17.6cm)
    circle_radius: 0.07 # Radius of the circle 5cm

    # delta_width_qr_center: 0.340 # Half the distance between the centers of two markers in the horizontal direction 
    # delta_height_qr_center: 0.217 # Half the distance between the centers of two markers in the vertical direction (13.5cm / 2)
