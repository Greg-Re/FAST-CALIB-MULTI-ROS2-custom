    # delta_height_circles: 0.126 # Distance between the centers of two circles in the vertical direction (17.6cm)
    
    # Distance filter
    x_min: 0.6
    x_max: 1.8
    y_min: -1.0
    y_max: 1.0
    z_min: 0.4
    z_max: 0.9  
    

    # Input
    lidar_topic: "/livox/lidar" # /ouster/points /livox/lidar
    bag_path: "/home/alux-autopilot22/FAST-CALIB-MULTI-ROS2/calib_data/AR0234-MID360"
